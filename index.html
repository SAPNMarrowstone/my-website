<!DOCTYPE html>
<html>
<head>
    <title>My Player Site</title>
    <style>
        /* This is optional CSS to make it look a bit cleaner */
        body { font-family: sans-serif; padding: 20px; }
        #playerList { margin-top: 10px; }
    </style>
</head>
<body>

    <h1>My Website</h1>

    <section id="player-setup">
        <h2>Add a New Player</h2>
        <input type="text" id="playerName" placeholder="Enter name...">
        <button onclick="addPlayer()">Add Player</button>
       
        <ul id="playerList">
            </ul>
    </section>

    <script>
        function addPlayer() {
            // Finding the input box and the list in the HTML
            const nameInput = document.getElementById('playerName');
            const list = document.getElementById('playerList');
           
            // Checking if the box actually has a name in it
            if (nameInput.value.trim() !== "") {
                const newEntry = document.createElement('li'); // Create a list item
                newEntry.textContent = nameInput.value;        // Put the name in it
                list.appendChild(newEntry);                   // Add it to the list
                nameInput.value = "";                         // Clear the box
            }
        }
    </script>
    <script>
  function addPlayer() {
    const nameInput = document.getElementById('playerName');
    const list = document.getElementById('playerList');
   
    if (nameInput.value !== "") {
      const newEntry = document.createElement('li');
      newEntry.textContent = nameInput.value;
      list.appendChild(newEntry);
      nameInput.value = ""; // Clears the box after adding
    }
  }
</script>
    
</body>
</html>
